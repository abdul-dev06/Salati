<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salati</title>
  <link rel="manifest" href="/Salati/manifest.json">
  <meta name="theme-color" content="#090c14">
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Libertinus+Mono&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

  <!-- Tree layer (behind everything) -->
  <canvas id="stars"></canvas>
  <canvas id="tree"></canvas>
  <canvas id="tree-fg"></canvas>
  <div id="fog"></div>

  <!-- Arabic verse at top -->
  <div id="arabic-verse">إِنَّ الصَّلَاةَ كَانَتْ عَلَى الْمُؤْمِنِينَ كِتَابًا مَوْقُوتًا</div>

  <canvas id="weather-canvas"></canvas>

  <div id="weather-toggle" title="Tap to change weather">✦</div>

  <!-- UI layer -->
  <div id="panel-left">
    <div class="panel-half panel-top" id="panel-time">
      <span id="timeHour">00</span>
      <span id="timeMinute">00</span>
    </div>
    <div class="panel-half panel-bottom" id="panel-weather">
      <span id="currentWeather">—</span>
    </div>
  </div>

  <div id="prayer-table">

    <div class="prayer-row" id="fajrrow">
      <div class="col prayername" id="fajr-name">الفجر</div>
      <div class="col prayeriqamah" id="fajr-iqamah">6:00 AM</div>
    </div>

    <div class="prayer-row" id="dhuhrrow">
      <div class="col prayername" id="dhuhr-name">الظهر</div>
      <div class="col prayeriqamah" id="dhuhr-iqamah">2:30 PM</div>
    </div>

    <div class="prayer-row" id="asrrow">
      <div class="col prayername" id="asr-name">العصر</div>
      <div class="col prayeriqamah" id="asr-iqamah">6:30 PM</div>
    </div>

    <div class="prayer-row" id="maghribrow">
      <div class="col prayername" id="maghrib-name">المغرب</div>
      <div class="col prayeriqamah" id="maghrib-iqamah">9:30 PM</div>
    </div>

    <div class="prayer-row" id="isharow">
      <div class="col prayername" id="isha-name">العشاء</div>
      <div class="col prayeriqamah" id="isha-iqamah">11:05 PM</div>
    </div>

  </div>

  <div id="panel-right">
    <div class="panel-half panel-top" id="panel-date">
      <span id="currentDate">—</span>
    </div>
    <div class="panel-half panel-bottom" id="panel-hijri">
      <span id="hijriDate">—</span>
    </div>
  </div>

  <div id="countdown">
    <span id="countdown-name">—</span>
    <br>
    <span id="countdown-time">--:--:--</span>
  </div>

  <script src="tree.js"></script>
  <script src="weather.js"></script>
  <script src="app.js"></script>
</body>

</html>
